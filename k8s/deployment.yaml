apiVersion: apps/v1
kind: Deployment
metadata:
  name: mattermost
  namespace: nekazari
  labels:
    app: mattermost
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mattermost
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: mattermost
    spec:
      initContainers:
        - name: wait-for-db
          image: postgres:14-alpine
          command:
            [
              "sh",
              "-c",
              "until pg_isready -h postgresql -U postgres; do echo waiting for database; sleep 2; done;",
            ]
      containers:
        - name: mattermost
          image: mattermost/mattermost-team-edition:9.5.1
          ports:
            - containerPort: 8065
          env:
            # --- Database Configuration ---
            - name: MM_SQLSETTINGS_DRIVERNAME
              value: "postgres"
            - name: MM_SQLSETTINGS_DATASOURCE
              valueFrom:
                secretKeyRef:
                  name: mattermost-secret
                  key: db-connection-string

            # --- File Storage (MinIO) ---
            - name: MM_FILESETTINGS_DRIVERNAME
              value: "amazon_s3"
            - name: MM_FILESETTINGS_AMAZONS3ACCESSKEYID
              valueFrom:
                secretKeyRef:
                  name: nekazari-secrets
                  key: minio-root-user
            - name: MM_FILESETTINGS_AMAZONS3SECRETACCESSKEY
              valueFrom:
                secretKeyRef:
                  name: nekazari-secrets
                  key: minio-root-password
            - name: MM_FILESETTINGS_AMAZONS3BUCKET
              value: "mattermost-data"
            - name: MM_FILESETTINGS_AMAZONS3ENDPOINT
              value: "http://minio-service:9000"
            - name: MM_FILESETTINGS_AMAZONS3SSL
              value: "false"

            # --- General Settings ---
            - name: MM_SERVICESETTINGS_SITEURL
              value: "https://chat.nkz.robotika.cloud"
            - name: MM_SERVICESETTINGS_SECURITY
              value: "true"

            # --- Auth (Keycloak via GitLab) ---
            - name: MM_GITLABSETTINGS_ENABLE
              value: "true"
            - name: MM_GITLABSETTINGS_SECRET
              valueFrom:
                secretKeyRef:
                  name: mattermost-secret
                  key: gitlab-client-secret
            - name: MM_GITLABSETTINGS_ID
              valueFrom:
                secretKeyRef:
                  name: mattermost-secret
                  key: gitlab-client-id
            - name: MM_GITLABSETTINGS_SCOPE
              value: "openid profile email"
            - name: MM_GITLABSETTINGS_AUTHENDPOINT
              value: "https://auth.robotika.cloud/realms/nkz/protocol/openid-connect/auth"
            - name: MM_GITLABSETTINGS_TOKENENDPOINT
              value: "https://auth.robotika.cloud/realms/nkz/protocol/openid-connect/token"
            - name: MM_GITLABSETTINGS_USERAPIENDPOINT
              value: "https://auth.robotika.cloud/realms/nkz/protocol/openid-connect/userinfo"

            # --- Team Settings ---
            - name: MM_TEAMSETTINGS_RESTRICTTEAMINVITE
              value: "true" # Soft Isolation: Only admins invite to teams

          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /api/v4/system/ping
              port: 8065
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v4/system/ping
              port: 8065
            initialDelaySeconds: 10
            periodSeconds: 5
